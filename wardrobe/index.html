<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Wardrobe</title>
<meta name="description" content="A private closet log, wear diary, and outfit-pairing engine.">
<meta name="theme-color" content="#F4F3F7">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root{
  --bg:#F4F3F7; --paper:#FFFFFF; --ink:#262430; --soft:#6E6A7A; --faint:#A39FAE;
  --line:#DFDCE7; --line-soft:#EAE8F0;
  --accent:#7C6BAE; --accent-ink:#5B4D8A; --accent-wash:#EFEBF7;
  --olive:#6B7250; --camel:#B98E5F; --blush:#D89AA9;
  --good:#4E7A52; --good-wash:#E8F0E8; --bad:#A8423F; --bad-wash:#F5E7E6; --warn:#A8743F;
  --r:10px; --shadow:0 10px 26px rgba(38,36,48,.12);
  --disp:"Didot","Bodoni MT","Playfair Display","Times New Roman",serif;
  --body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 var(--body);padding-bottom:env(safe-area-inset-bottom)}
button{font:inherit;color:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:inherit}
a{color:var(--accent-ink)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
::selection{background:var(--accent-wash)}

/* ---------- masthead ---------- */
header.mast{padding:22px 16px 0;max-width:1180px;margin:0 auto}
.mast .eyebrow{font:600 10px var(--mono);letter-spacing:.22em;text-transform:uppercase;color:var(--soft)}
.mast h1{font:400 40px/1 var(--disp);margin:4px 0 2px;letter-spacing:.01em}
.mast h1 em{font-style:italic;color:var(--accent-ink)}
.mast .sub{color:var(--soft);font-size:13px;margin:0 0 12px}
.rule-label{border:none;border-top:1px solid var(--ink);position:relative;margin:0}
.rule-label::after{content:"";display:block;border-top:1px solid var(--ink);margin-top:2px}

/* ---------- tabs ---------- */
nav.tabs{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
nav.tabs .wrap{max-width:1180px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;padding:0 10px;scrollbar-width:none}
nav.tabs .wrap::-webkit-scrollbar{display:none}
.tabbtn{appearance:none;background:none;border:none;padding:12px 12px 10px;font:600 12px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--soft);border-bottom:2px dashed transparent;white-space:nowrap}
.tabbtn[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--accent)}
.tabbtn .cnt{color:var(--faint);font-weight:500}

main{max-width:1180px;margin:0 auto;padding:14px 14px 110px}
section[hidden]{display:none}
h2.sec{font:400 24px var(--disp);margin:18px 0 4px}
p.hint{color:var(--soft);font-size:13px;margin:2px 0 12px}
hr.seam{border:none;border-top:2px dashed var(--line);margin:20px 0}

/* ---------- controls ---------- */
.btn{border:1px solid var(--ink);background:var(--paper);border-radius:8px;padding:8px 14px;font-weight:600;font-size:13px;transition:transform .12s}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.ghost{border-color:var(--line);color:var(--soft);background:transparent}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn.danger{border-color:var(--bad);color:var(--bad);background:var(--paper)}
.btn[disabled]{opacity:.45;cursor:default}
.iconb{border:1px solid var(--line);background:var(--paper);border-radius:8px;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;color:var(--soft)}
.iconb[aria-pressed="true"]{border-color:var(--ink);color:var(--ink);background:var(--accent-wash)}
input[type=text],input[type=search],input[type=date],input[type=url],input[type=number],select,textarea{
  background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;max-width:100%}
textarea{width:100%;min-height:64px;resize:vertical}
label.fld{display:block;font:600 11px var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin:10px 0 4px}
.fieldrow{display:flex;gap:10px;flex-wrap:wrap}
.fieldrow>div{flex:1;min-width:130px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--paper)}
.seg button{border:none;background:none;padding:7px 12px;font-size:12px;font-weight:600;color:var(--soft)}
.seg button[aria-pressed="true"]{background:var(--ink);color:var(--paper)}

/* toolbar */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:12px 0 10px}
.toolbar .grow{flex:1;min-width:150px}
.toolbar input[type=search]{width:100%}
.pillrow{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none}
.pillrow::-webkit-scrollbar{display:none}
.pill{border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:5px 12px;font-size:12.5px;font-weight:600;color:var(--soft);white-space:nowrap}
.pill[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.filters select{font-size:12.5px;padding:6px 8px}
.chk{display:inline-flex;gap:6px;align-items:center;font-size:12.5px;color:var(--soft);font-weight:600}

/* ---------- hang-tag chips ---------- */
.tag{display:inline-flex;align-items:center;font:600 10px var(--mono);letter-spacing:.05em;text-transform:uppercase;border:1px solid currentColor;border-radius:3px;padding:1.5px 5px 1.5px 12px;position:relative;color:var(--soft)}
.tag::before{content:"";width:4px;height:4px;border:1px solid currentColor;border-radius:50%;position:absolute;left:4px;top:50%;transform:translateY(-50%)}
.tag.accent{color:var(--accent-ink)}
.tag.good{color:var(--good)} .tag.bad{color:var(--bad)} .tag.warn{color:var(--warn)}
.chip{display:inline-block;font-size:11.5px;font-weight:600;color:var(--soft);background:var(--line-soft);border-radius:999px;padding:2px 9px}
.why{display:inline-block;font-size:11px;color:var(--accent-ink);background:var(--accent-wash);border-radius:999px;padding:2px 8px;margin:2px 3px 0 0}
.why.neg{color:var(--bad);background:var(--bad-wash)}

/* ---------- closet grid (signature: fabric swatches) ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px}
@media(min-width:760px){.grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;cursor:pointer;position:relative;transition:transform .16s ease,box-shadow .16s ease;text-align:left;padding:0}
.card:hover{transform:translateY(-3px) rotate(-.5deg);box-shadow:var(--shadow);z-index:2}
.card.dep{opacity:.5}
.card.selected{outline:2.5px solid var(--accent);outline-offset:-1px}
.sw{aspect-ratio:1/1;position:relative;display:block}
.sw img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sw .stitch{position:absolute;inset:7px;border:1.5px dashed var(--stitch,rgba(0,0,0,.2));border-radius:6px;pointer-events:none}
.sw .cat-ic{position:absolute;right:7px;bottom:7px;width:22px;height:22px;color:var(--icink,rgba(0,0,0,.45))}
.sw .selmark{position:absolute;left:7px;top:7px;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;display:none;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.card.selected .selmark{display:flex}
.card .meta{padding:7px 9px 9px}
.card .nm{font-size:12.5px;font-weight:600;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.5em}
.card .sub{display:flex;align-items:center;gap:6px;margin-top:5px;color:var(--faint)}
.card .sub .wear{font:600 10px var(--mono);margin-left:auto}

/* list (description) view */
.lrows{border:1px solid var(--line);border-radius:var(--r);background:var(--paper);overflow:hidden}
.lrow{display:grid;grid-template-columns:44px minmax(140px,1.7fr) .9fr 1fr 1.2fr auto;gap:10px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--line-soft);cursor:pointer;width:100%;background:none;border-left:none;border-right:none;border-top:none;text-align:left;font-size:13px}
.lrow:last-child{border-bottom:none}
.lrow:hover{background:var(--accent-wash)}
.lrow.selected{background:var(--accent-wash);box-shadow:inset 3px 0 0 var(--accent)}
.lrow.dep{opacity:.5}
.lrow .mini{width:38px;height:38px;border-radius:7px;border:1px solid var(--line);position:relative;overflow:hidden;flex:none}
.lrow .mini img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.lrow .nm{font-weight:600}
.lrow .dim{color:var(--soft);font-size:12px}
.lrow .col-h{display:block}
@media(max-width:740px){.lrow{grid-template-columns:44px 1fr auto}.lrow .col-h{display:none}}
.mini{width:30px;height:30px;border-radius:6px;border:1px solid var(--line);display:inline-block;position:relative;overflow:hidden;vertical-align:middle}
.mini img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}

/* ---------- selection action bar ---------- */
.selbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(14px + env(safe-area-inset-bottom));z-index:40;background:var(--ink);color:var(--paper);border-radius:14px;box-shadow:var(--shadow);padding:10px 12px;display:none;gap:8px;align-items:center;max-width:min(96vw,640px);flex-wrap:wrap;justify-content:center}
.selbar.on{display:flex}
.selbar .n{font:700 12px var(--mono);background:var(--accent);border-radius:999px;padding:2px 9px}
.selbar .btn{background:transparent;border-color:rgba(255,255,255,.35);color:var(--paper)}
.selbar .btn.accent{background:var(--accent);border-color:var(--accent)}

/* ---------- cards / panels ---------- */
.panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin:10px 0}
.panel h3{font:400 18px var(--disp);margin:0 0 6px}
.entry{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:12px;margin:8px 0}
.entry .top{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.entry .date{font:600 11px var(--mono);color:var(--soft)}
.entry .ttl{font-weight:700}
.entry .minis{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0 2px}
.entry .notes{color:var(--soft);font-size:13px;margin-top:4px}
.entry .acts{display:flex;gap:6px;margin-top:8px}
.mon{font:600 11px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:18px 0 4px}

/* outfit suggestion cards */
.fitcard{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:12px;margin:10px 0}
.fitcard .items{display:flex;gap:8px;flex-wrap:wrap}
.fitcard .it{display:flex;gap:7px;align-items:center;border:1px solid var(--line-soft);border-radius:8px;padding:4px 8px 4px 4px;font-size:12.5px;font-weight:600;background:var(--bg)}
.score{font:700 13px var(--mono);color:var(--accent-ink);border:1.5px solid var(--accent);border-radius:999px;padding:2px 9px;display:inline-block}
.fitcard .hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}

/* weight bars */
.wrow{display:grid;grid-template-columns:110px 1fr 38px;gap:8px;align-items:center;font-size:12px;margin:4px 0}
.wbar{height:8px;border-radius:99px;background:var(--line-soft);position:relative;overflow:hidden}
.wbar i{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:99px}
.wbar i.neg{background:var(--bad)}

/* stats */
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:12px 0}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:12px}
.stat .v{font:400 30px var(--disp)}
.stat .k{font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}
.bar{display:grid;grid-template-columns:90px 1fr 30px;gap:8px;align-items:center;font-size:12.5px;margin:5px 0}
.bar .tr{height:10px;background:var(--line-soft);border-radius:99px;overflow:hidden}
.bar .tr i{display:block;height:100%;background:var(--camel);border-radius:99px}

/* ---------- modal ---------- */
.scrim{position:fixed;inset:0;background:rgba(38,36,48,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:720px){.scrim{align-items:center;padding:24px}}
.sheet{background:var(--bg);width:100%;max-width:700px;max-height:92vh;overflow:auto;border-radius:18px 18px 0 0;padding:18px 16px calc(22px + env(safe-area-inset-bottom));border:1px solid var(--line)}
@media(min-width:720px){.sheet{border-radius:14px;padding:22px}}
.sheet .shead{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.sheet .shead h3{font:400 22px var(--disp);margin:0;flex:1}
.xbtn{border:1px solid var(--line);background:var(--paper);border-radius:8px;width:32px;height:32px;font-size:15px;line-height:1;flex:none}
.bigsw{width:100%;aspect-ratio:16/10;border-radius:12px;border:1px solid var(--line);position:relative;overflow:hidden;margin-bottom:12px}
.bigsw img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.bigsw .stitch{position:absolute;inset:10px;border:2px dashed var(--stitch,rgba(0,0,0,.2));border-radius:8px;pointer-events:none}

/* item picker inside modals */
.pick{border:1px solid var(--line);border-radius:10px;background:var(--paper);max-height:240px;overflow:auto;margin-top:6px}
.pick .pr{display:flex;gap:9px;align-items:center;width:100%;background:none;border:none;border-bottom:1px solid var(--line-soft);padding:7px 10px;text-align:left;font-size:13px}
.pick .pr:hover{background:var(--accent-wash)}
.pick .pr .tick{margin-left:auto;color:var(--accent-ink);font-weight:700;visibility:hidden}
.pick .pr.on .tick{visibility:visible}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.chips .ich{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:3px 9px 3px 4px;font-size:12px;font-weight:600}
.chips .ich button{border:none;background:none;color:var(--faint);padding:0 2px;font-size:13px}

/* toast */
#toasts{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;width:min(94vw,420px)}
.toast{background:var(--ink);color:var(--paper);border-radius:10px;padding:10px 14px;font-size:13.5px;box-shadow:var(--shadow);animation:tin .25s ease}
.toast.err{background:var(--bad)}
@keyframes tin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

.empty{border:2px dashed var(--line);border-radius:var(--r);padding:26px 16px;text-align:center;color:var(--soft);font-size:13.5px;margin:12px 0}
.empty b{display:block;font:400 19px var(--disp);color:var(--ink);margin-bottom:4px}

footer{max-width:1180px;margin:30px auto 0;padding:0 16px 26px;color:var(--faint);font-size:12px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}.card:hover{transform:none}}
</style>
</head>
<body>

<header class="mast">
  <div class="eyebrow">Personal closet · wear diary · pairing engine</div>
  <h1><em>wardrobe</em></h1>
  <p class="sub">Every piece, every wear, and what goes with what — yours, on any device.</p>
  <hr class="rule-label">
</header>

<nav class="tabs" aria-label="Sections"><div class="wrap" id="tabwrap">
  <button class="tabbtn" data-tab="closet" aria-selected="true">Closet <span class="cnt" id="cnt-items"></span></button>
  <button class="tabbtn" data-tab="log" aria-selected="false">Wear log <span class="cnt" id="cnt-log"></span></button>
  <button class="tabbtn" data-tab="pair" aria-selected="false">Pairings <span class="cnt" id="cnt-pair"></span></button>
  <button class="tabbtn" data-tab="stats" aria-selected="false">Stats</button>
  <button class="tabbtn" data-tab="data" aria-selected="false">Data</button>
</div></nav>

<main>
  <section id="view-closet"></section>
  <section id="view-log" hidden></section>
  <section id="view-pair" hidden></section>
  <section id="view-stats" hidden></section>
  <section id="view-data" hidden></section>
</main>

<div class="selbar" id="selbar" role="toolbar" aria-label="Selected items actions">
  <span class="n" id="selcount">0</span>
  <button class="btn sm" id="sb-log">Log wear</button>
  <button class="btn sm" id="sb-pair">Save pairing</button>
  <button class="btn sm accent" id="sb-suggest">Suggest matches</button>
  <button class="btn sm" id="sb-share">Share</button>
  <button class="btn sm ghost" id="sb-clear" style="color:#cfc9dd">Clear</button>
</div>

<div id="modalroot"></div>
<div id="toasts" aria-live="polite"></div>

<footer>
  Wear log, ratings and photos are stored only in this browser — export a backup from the Data tab now and then.
</footer>

/* tiny IndexedDB key-value store (for photos) with in-memory fallback */
const memKV=new Map();
let _idb=null;
function idbOpen(){
  if(_idb)return _idb;
  _idb=new Promise((res)=>{ try{
    const r=indexedDB.open('wardrobe-kv',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('kv');
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>res(null);
  }catch(e){res(null);} });
  return _idb;
}
async function idbGet(k){const db=await idbOpen();if(!db)return memKV.get(k);
  return new Promise(res=>{try{const t=db.transaction('kv').objectStore('kv').get(k);t.onsuccess=()=>res(t.result);t.onerror=()=>res(undefined);}catch(e){res(memKV.get(k));}});}
async function idbSet(k,v){const db=await idbOpen();if(!db){memKV.set(k,v);return;}
  return new Promise(res=>{try{const t=db.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>res();t.onerror=()=>{memKV.set(k,v);res();};}catch(e){memKV.set(k,v);res();}});}
async function idbDel(k){const db=await idbOpen();if(!db){memKV.delete(k);return;}
  return new Promise(res=>{try{const t=db.transaction('kv','readwrite').objectStore('kv').delete(k);t.onsuccess=()=>res();t.onerror=()=>res();}catch(e){res();}});}
async function idbKeys(){const db=await idbOpen();if(!db)return [...memKV.keys()];
  return new Promise(res=>{try{const t=db.transaction('kv').objectStore('kv').getAllKeys();t.onsuccess=()=>res(t.result||[]);t.onerror=()=>res([...memKV.keys()]);}catch(e){res([...memKV.keys()]);}});}

/* ---------- color & swatch helpers ---------- */
function hex2rgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function lum(h){const[r,g,b]=hex2rgb(h);return (0.2126*r+0.7152*g+0.0722*b)/255;}
function shade(h,f){const[r,g,b]=hex2rgb(h);const m=v=>Math.max(0,Math.min(255,Math.round(v*f)));return `rgb(${m(r)},${m(g)},${m(b)})`;}
const hexOf=c=>COLOR_HEX[(c||'').toLowerCase().trim()]||DEF_HEX;
function nameOnSwatch(it){return !it.c1;}
function swatchCSS(it){
  const a=hexOf(it.c1||''),hasB=!!it.c2,b=hasB?hexOf(it.c2):shade(a,1.25);
  const p=(it.pat||'').toLowerCase();
  let img='linear-gradient(160deg,rgba(255,255,255,.18),rgba(0,0,0,.10))',size='auto';
  if(p.includes('pinstripe'))img=`repeating-linear-gradient(90deg,transparent 0 13px,${hasB?b:'rgba(255,255,255,.7)'} 13px 15px)`;
  else if(p.includes('stripe'))img=`repeating-linear-gradient(90deg,transparent 0 14px,${b} 14px 24px)`;
  else if(p.includes('plaid'))img=`repeating-linear-gradient(0deg,${b}55 0 5px,transparent 5px 20px),repeating-linear-gradient(90deg,${b}55 0 5px,transparent 5px 20px)`;
  else if(p.includes('floral')){img=`radial-gradient(circle,${hasB?b:'rgba(255,255,255,.75)'} 0 5px,transparent 6px)`;size='34px 34px';}
  else if(p.includes('print')){img=`repeating-conic-gradient(${b}66 0 25%,transparent 0 50%)`;size='30px 30px';}
  else if(p.includes('block'))img=`linear-gradient(135deg,transparent 0 55%,${b} 55%)`;
  else if(p.includes('cable'))img=`repeating-linear-gradient(45deg,rgba(255,255,255,.22) 0 5px,transparent 5px 12px),repeating-linear-gradient(-45deg,rgba(0,0,0,.10) 0 5px,transparent 5px 12px)`;
  else if(hasB)img=`linear-gradient(315deg,${b} 0 24%,transparent 24.5%),linear-gradient(160deg,rgba(255,255,255,.18),rgba(0,0,0,.10))`;
  const stitch=lum(a)>0.62?'rgba(0,0,0,.22)':'rgba(255,255,255,.5)';
  const icink=lum(a)>0.62?'rgba(0,0,0,.45)':'rgba(255,255,255,.7)';
  return `background-color:${a};background-image:${img};background-size:${size};--stitch:${stitch};--icink:${icink}`;
}

/* ---------- photos ----------
   Resolution order for each item, highest priority first:
     1. a photo you uploaded in-app (stored in this browser only)  \u2014 a per-device override
     2. an explicit Photo URL typed into the item
     3. a static file in the photos/ folder named by id, e.g. photos/41.jpg
     4. nothing \u2192 the generated colour swatch
   The photos/ folder is the canonical, shared, cross-device source. */
const PHOTO_DIR='photos/';
const PHOTO_EXTS=['jpg','jpeg','png','webp'];          // web-renderable; HEIC won't display in browsers
const photoUpload=new Map();    // id -> dataURL (mirror of IndexedDB uploads)
const photoResolved=new Map();  // id -> url|null (cached best source for this session)
let photoManifest=null;         // optional {id:'filename'} from photos/manifest.json; null = probe instead
function photoFilename(it){return PHOTO_DIR+it.id+'.jpg';} // suggested name to save (any of PHOTO_EXTS works)
function invalidatePhoto(id){photoResolved.delete(Number(id));}
async function loadPhotoManifest(){
  try{
    const r=await fetch(PHOTO_DIR+'manifest.json',{cache:'no-store'});
    if(!r.ok)return;
    const j=await r.json();photoManifest={};
    if(Array.isArray(j))j.forEach(f=>{photoManifest[String(f).split('.')[0]]=f;});
    else for(const[k,v]of Object.entries(j))photoManifest[k]=/\./.test(String(v))?v:k+'.'+v;
  }catch(e){/* no manifest \u2192 fall back to probing */}
}
function probeStatic(id){
  return new Promise(res=>{
    let i=0;
    (function next(){
      if(i>=PHOTO_EXTS.length)return res(null);
      const url=PHOTO_DIR+id+'.'+PHOTO_EXTS[i++];
      const im=new Image();
      im.onload=()=>res(url); im.onerror=next; im.src=url;
    })();
  });
}
async function resolvePhoto(it){
  const id=Number(it.id);
  if(photoResolved.has(id))return photoResolved.get(id);
  let url=null;
  if(photoUpload.has(id))url=photoUpload.get(id);
  if(!url){try{const up=await idbGet('photo:'+id);if(up){photoUpload.set(id,up);url=up;}}catch(e){}}
  if(!url&&it.photo)url=it.photo;
  if(!url&&photoManifest&&photoManifest[id])url=PHOTO_DIR+photoManifest[id];
  if(!url&&!photoManifest)url=await probeStatic(id);
  photoResolved.set(id,url);
  return url;
}
function lazyPhotos(scope){

function lastWorn(id){let best='';for(const e of wearLog)if((e.items||[]).map(Number).includes(Number(id))&&e.date>best)best=e.date;return best;}
function colorOptions(){const s=new Set();items.forEach(it=>{if(it.c1)s.add(it.c1.toLowerCase());if(it.c2)s.add(it.c2.toLowerCase());});return [...s].sort();}
function occOptions(){const s=new Set(OCCASIONS);items.forEach(it=>(it.occ||[]).forEach(o=>s.add(o)));return [...s];}

function filteredItems(){
  const q=F.q.toLowerCase();
  let list=items.filter(it=>{
    if(prefs.hideDep&&it.dep)return false;

    if(F.season&&!(it.sea||[]).includes(F.season))return false;
    if(F.occ&&!(it.occ||[]).includes(F.occ))return false;
    if(F.form&&String(it.form||'')!==F.form)return false;
    if(q){const hay=`${it.name} ${it.desc} ${it.brand} ${it.sub} ${it.c1} ${it.c2} ${it.mat} ${it.notes}`.toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  const wc=wearCounts();

    id:(a,b)=>a.id-b.id, name:(a,b)=>a.name.localeCompare(b.name),

/* ============================================================
   PAIRING ENGINE
   ============================================================ */
let _co=null,_rated=null;
function pairKey(a,b){a=Number(a);b=Number(b);return a<b?a+'|'+b:b+'|'+a;}
function coMap(){
  if(_co)return _co;_co=new Map();
  for(const e of wearLog){
    const w=e.kind==='season'?0.15:1;
    const ids=[...new Set((e.items||[]).map(Number))];
    for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++){const k=pairKey(ids[i],ids[j]);_co.set(k,(_co.get(k)||0)+w);}
  }
  return _co;
}
function ratedMap(){
  if(_rated)return _rated;_rated=new Map();
  const sorted=[...pairings].sort((a,b)=>(a.ts||0)-(b.ts||0));
  for(const p of sorted){
    const v=p.verdict==='great'?1:p.verdict==='good'?0.4:-1;
    const ids=[...new Set((p.items||[]).map(Number))];
    for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++)_rated.set(pairKey(ids[i],ids[j]),v);
  }
  return _rated;
}
const colorList=it=>[it.c1,it.c2].map(c=>(c||'').toLowerCase().trim()).filter(Boolean);
function harmonyPair(c1,c2){
  if(c1===c2)return .45;
  const n1=NEUTRALS.has(c1),n2=NEUTRALS.has(c2);
  if(n1&&n2)return .35; if(n1||n2)return .55;
  const h1=HUES[c1],h2=HUES[c2]; if(h1==null||h2==null)return .1;
  let d=Math.abs(h1-h2); d=Math.min(d,360-d);
  if(d<=35)return .5; if(d<=70)return .25; if(d>=150)return .45; return -.35;
}
function setScore(a,b){a=a||[];b=b||[];if(!a.length||!b.length)return .15;
  const inter=a.filter(x=>b.includes(x)).length, uni=new Set([...a,...b]).size;
  return (inter/uni)*1.3-.35;}
function featuresPair(A,B){
  const ca=colorList(A),cb=colorList(B);
  let color=.1;
  if(ca.length&&cb.length){let s=0,n=0;for(const x of ca)for(const y of cb){s+=harmonyPair(x,y);n++;}color=s/n;}
  const pa=A.pat&&A.pat!=='solid',pb=B.pat&&B.pat!=='solid';
  const pattern=pa&&pb?-.45:(pa||pb)?.3:.15;
  const form=(A.form&&B.form)?Math.max(-1,1-Math.abs(A.form-B.form)*.55):0;
  const warm=(A.warm&&B.warm)?Math.max(-1,1-Math.abs(A.warm-B.warm)*.45):0;
  const season=setScore(A.sea,B.sea), occ=setScore(A.occ,B.occ);
  const c=coMap().get(pairKey(A.id,B.id))||0;
  const co=c?Math.min(1,Math.log(1+c)/Math.log(4)):0;
  const rated=ratedMap().get(pairKey(A.id,B.id))||0;
  return {color,pattern,form,warm,season,occ,co,rated};
}
const FEATS=['color','pattern','form','warm','season','occ','co','rated'];
const sig=z=>1/(1+Math.exp(-z));
function rawScore(f){let s=W.bias||0;for(const k of FEATS)s+=(W[k]||0)*f[k];return s;}
function pairPct(A,B){return Math.max(1,Math.min(99,Math.round(100*sig(rawScore(featuresPair(A,B))))));}
const FEAT_TXT={
  color:['colours work together','colours may clash'],
  pattern:['pattern + solid balance','two patterns compete'],
  form:['formality matches','formality gap'],
  warm:['similar weight','weight mismatch'],
  season:['season overlap','different seasons'],
  occ:['shared occasions','different occasions'],
  co:['worn together before','—'],
  rated:['rated well before','you said no to this pair']
};
function explainFeatures(f,limit=3){
  const parts=FEATS.map(k=>({k,v:(W[k]||0)*f[k]})).filter(p=>Math.abs(p.v)>=.14).sort((a,b)=>Math.abs(b.v)-Math.abs(a.v)).slice(0,limit);
  return parts.map(p=>`<span class="why ${p.v<0?'neg':''}">${FEAT_TXT[p.k][p.v<0?1:0]}</span>`).join('');
}
function avgFeatures(ids){
  const its=ids.map(byId).filter(Boolean);const acc={};FEATS.forEach(k=>acc[k]=0);let n=0;
  for(let i=0;i<its.length;i++)for(let j=i+1;j<its.length;j++){const f=featuresPair(its[i],its[j]);FEATS.forEach(k=>acc[k]+=f[k]);n++;}
  if(n)FEATS.forEach(k=>acc[k]/=n);
  return {f:acc,n};
}
function sgdStep(f,y,lr=0.35){
  const p=sig(rawScore(f)),g=y-p;
  for(const k of FEATS)W[k]=Math.max(-3,Math.min(3,(W[k]||0)+lr*g*f[k]));
  W.bias=Math.max(-2,Math.min(2,(W.bias||0)+lr*.4*g));
}
const verdY=v=>v==='great'?1:v==='good'?0.65:0;
function learnFromSample(ids,verdict){
  const {f,n}=avgFeatures(ids); if(!n)return;
  sgdStep(f,verdY(verdict)); trainCount++; saveW();
}
function retrainAll(){
  W=Object.assign({},DEFAULT_W);
  const samples=pairings.filter(p=>(p.items||[]).length>=2).map(p=>({f:avgFeatures(p.items).f,y:verdY(p.verdict)}));
  for(let e=0;e<14;e++){samples.sort(()=>Math.random()-.5);for(const s of samples)sgdStep(s.f,s.y,.25);}
  trainCount=samples.length;saveW();
}
function suggestForIds(ids){
  const anchors=ids.map(byId).filter(Boolean); if(!anchors.length)return [];
  const groups=new Map();
  for(const it of items){
    if(it.dep||it.cat==='underlayer'||ids.map(Number).includes(it.id))continue;
    let s=0;const fAgg={};FEATS.forEach(k=>fAgg[k]=0);
    for(const a of anchors){const f=featuresPair(a,it);s+=rawScore(f);FEATS.forEach(k=>fAgg[k]+=f[k]);}
    s/=anchors.length;FEATS.forEach(k=>fAgg[k]/=anchors.length);
    const pct=Math.max(1,Math.min(99,Math.round(100*sig(s))));
    if(!groups.has(it.cat))groups.set(it.cat,[]);
    groups.get(it.cat).push({it,pct,why:explainFeatures(fAgg,2)});
  }
  const out=[...groups.entries()].map(([cat,list])=>({cat,list:list.sort((a,b)=>b.pct-a.pct).slice(0,4)}));
  return out.sort((a,b)=>b.list[0].pct-a.list[0].pct);
}
function outfitScore(its){
  let s=0,n=0;const fAgg={};FEATS.forEach(k=>fAgg[k]=0);
  for(let i=0;i<its.length;i++)for(let j=i+1;j<its.length;j++){const f=featuresPair(its[i],its[j]);s+=rawScore(f);FEATS.forEach(k=>fAgg[k]+=f[k]);n++;}
  if(n){s/=n;FEATS.forEach(k=>fAgg[k]/=n);}
  return {pct:Math.max(1,Math.min(99,Math.round(100*sig(s)))),raw:s,f:fAgg};
}
function buildOutfits(opts){
  const {occ='',sea='',withLayer=true,require=[]}=opts||{};
  const ok=it=>!it.dep&&it.cat!=='underlayer'
    &&(!occ||!(it.occ||[]).length||(it.occ||[]).includes(occ))
    &&(!sea||!(it.sea||[]).length||(it.sea||[]).includes(sea));
  const pool=items.filter(ok);
  const of=c=>pool.filter(it=>it.cat===c);
  const tops=of('top'),bottoms=of('bottom'),dresses=of('dress'),shoes=of('shoes');
  const layers=withLayer?pool.filter(it=>it.cat==='outerwear'||it.cat==='coat'):[];
  const bases=[];
  for(const d of dresses)bases.push([d]);
  for(const t of tops)for(const b of bottoms)bases.push([t,b]);
  const results=[];
  const shoeOpts=shoes.length?shoes:[null], layerOpts=[null,...layers];
  for(const base of bases){
    for(const s of shoeOpts)for(const l of layerOpts){
      const its=[...base];if(s)its.push(s);if(l)its.push(l);
      if(require.length&&!require.every(id=>its.some(x=>x.id===Number(id))))continue;
      const sc=outfitScore(its);
      let bonus=0;
      if(occ&&its.every(x=>(x.occ||[]).includes(occ)))bonus=3;
      results.push({items:its,pct:Math.min(99,sc.pct+bonus),f:sc.f,baseKey:base.map(x=>x.id).join('-')});
    }
  }
  results.sort((a,b)=>b.pct-a.pct);
  const seen=new Set(),out=[];
  for(const r of results){if(seen.has(r.baseKey))continue;seen.add(r.baseKey);out.push(r);if(out.length>=8)break;}
  return out;
}

function nextQuickfire(){
  const combos=[['top','bottom'],['dress','outerwear'],['dress','shoes'],['top','outerwear'],['bottom','outerwear'],['top','shoes'],['bottom','shoes'],['top','coat'],['bottom','coat']];
  const act=activeItems();
  for(let t=0;t<40;t++){
    const [c1,c2]=combos[Math.floor(Math.random()*combos.length)];
    const l1=act.filter(i=>i.cat===c1),l2=act.filter(i=>i.cat===c2);
    if(!l1.length||!l2.length)continue;
    const A=l1[Math.floor(Math.random()*l1.length)],B=l2[Math.floor(Math.random()*l2.length)];
    if(A.id===B.id)continue;
    if(ratedMap().has(pairKey(A.id,B.id)))continue;
    return [A,B];
  }
  return null;
}

function parseDelim(text){
  const firstNL=text.indexOf('\n');
  const first=firstNL>=0?text.slice(0,firstNL):text;
  const delim=first.includes('\t')?'\t':',';
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
    else{if(ch==='"')q=true;else if(ch===delim){row.push(cur);cur='';}else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(ch==='\r'){}else cur+=ch;}}
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(c=>String(c).trim()!==''));
}
const normH=h=>String(h||'').toLowerCase().trim().replace(/\s+/g,'_');
function hIdx(headers,names){for(const n of names){const i=headers.findIndex(h=>h===n);if(i>=0)return i;}for(const n of names){const i=headers.findIndex(h=>h.includes(n));if(i>=0)return i;}return -1;}
const splitList=s=>String(s||'').split(/[|,;]/).map(t=>t.trim()).filter(Boolean);
function matchItemIds(tokens){
  const ids=[],misses=[];
  for(const t of tokens){
    if(/^\d+$/.test(t)){ids.push(Number(t));continue;}
    const tl=t.toLowerCase();
    const hit=items.find(it=>it.name.toLowerCase()===tl)||items.find(it=>it.name.toLowerCase().includes(tl)||tl.includes(it.name.toLowerCase()));
    if(hit)ids.push(hit.id);else misses.push(t);
  }
  return {ids:[...new Set(ids)],misses};
}
function importItemsRows(rows){
  const hi=rows.findIndex(r=>r.map(normH).includes('name'));
  if(hi<0)return 'Couldn\u2019t find a header row with \u201cname\u201d.';
  const H=rows[hi].map(normH);
  const col={id:hIdx(H,['id']),name:hIdx(H,['name']),desc:hIdx(H,['description','desc']),cat:hIdx(H,['category']),sub:hIdx(H,['subcategory']),c1:hIdx(H,['primary_color','primary_colour']),c2:hIdx(H,['secondary_color','secondary_colour']),pat:hIdx(H,['pattern']),mat:hIdx(H,['material']),brand:hIdx(H,['brand']),size:hIdx(H,['size']),form:hIdx(H,['formality']),warm:hIdx(H,['warmth']),occ:hIdx(H,['occasions','occasion']),sea:hIdx(H,['seasons','season']),photo:hIdx(H,['photo_url','photo']),acq:hIdx(H,['date_acquired','acquired']),worn:hIdx(H,['worn_at','worn']),notes:hIdx(H,['notes']),care:hIdx(H,['care_notes','care'])};
  const g=(r,k)=>col[k]>=0?String(r[col[k]]||'').trim():'';
  let added=0,updated=0;
  for(const r of rows.slice(hi+1)){
    const name=g(r,'name');if(!name)continue;
    const id=parseInt(g(r,'id'))||(Math.max(0,...items.map(x=>x.id))+1);
    let occ=splitList(g(r,'occ')),dep=false;
    occ=occ.filter(o=>{if(o.toUpperCase()==='DEPRECATE'){dep=true;return false;}return true;});
    const parsed={id,name,desc:g(r,'desc'),cat:g(r,'cat')||'top',sub:g(r,'sub'),c1:g(r,'c1'),c2:g(r,'c2'),pat:g(r,'pat'),mat:g(r,'mat'),brand:g(r,'brand'),size:g(r,'size'),
      form:parseInt(g(r,'form'))||null,warm:parseInt(g(r,'warm'))||null,occ,sea:splitList(g(r,'sea')),photo:g(r,'photo'),acq:g(r,'acq'),
      worn:splitList(g(r,'worn')).map(t=>t.replace(/\s+/g,'-')),notes:g(r,'notes'),care:g(r,'care'),dep};
    const ex=byId(id);
    if(ex){const keepPhoto=ex.photo&&!parsed.photo?ex.photo:parsed.photo;Object.assign(ex,parsed,{photo:keepPhoto});updated++;}
    else{items.push(I(id,name,parsed));added++;}
  }
  saveItems();
  return `Items: ${added} added, ${updated} updated.`;
}
function importLogRows(rows){
  const hi=rows.findIndex(r=>{const H=r.map(normH);return H.some(h=>h.includes('item'))&&H.some(h=>h.includes('date'));});
  if(hi<0)return 'Couldn\u2019t find a header row with \u201cdate\u201d and \u201citem\u2026\u201d columns.';
  const H=rows[hi].map(normH);
  const col={date:hIdx(H,['date']),title:hIdx(H,['title','event','name','outfit']),occ:hIdx(H,['occasion']),items:hIdx(H,['item_ids','items','item']),notes:hIdx(H,['notes','note'])};
  const g=(r,k)=>col[k]>=0?String(r[col[k]]||'').trim():'';
  let added=0,missAll=[];
  for(const r of rows.slice(hi+1)){
    const {ids,misses}=matchItemIds(splitList(g(r,'items')));missAll.push(...misses);
    const date=g(r,'date'),title=g(r,'title');
    if(!ids.length&&!title)continue;
    if(wearLog.some(e=>e.source==='sheet'&&e.date===date&&e.title===title))continue;
    wearLog.push({id:uid(),date,title,occ:g(r,'occ'),items:ids,notes:g(r,'notes'),kind:'outfit',source:'sheet',approx:false});
    added++;
  }
  saveLog();
  return `Wear log: ${added} entries added.`+(missAll.length?` Couldn\u2019t match: ${missAll.slice(0,5).join('; ')}${missAll.length>5?'\u2026':''}`:'');
}
function importPairRows(rows){
  const hi=rows.findIndex(r=>r.map(normH).some(h=>h.includes('item')));
  if(hi<0)return 'Couldn\u2019t find a header row with an \u201citem\u2026\u201d column.';
  const H=rows[hi].map(normH);
  const col={items:hIdx(H,['item_ids','items','item','pieces']),verdict:hIdx(H,['verdict','rating','score','vote']),source:hIdx(H,['source','from','submitted_by','by']),notes:hIdx(H,['notes','note','comment']),url:hIdx(H,['url','link'])};
  const g=(r,k)=>col[k]>=0?String(r[col[k]]||'').trim():'';
  let added=0,missAll=[];
  for(const r of rows.slice(hi+1)){
    const {ids,misses}=matchItemIds(splitList(g(r,'items')));missAll.push(...misses);
    if(ids.length<2)continue;
    const vraw=g(r,'verdict').toLowerCase();
    const verdict=/great|love|yes|5|\u2764/.test(vraw)?'great':/no|bad|avoid|^1$|^2$/.test(vraw)?'no':'good';
    pairings.push({id:uid(),items:ids,verdict,source:g(r,'source')||'sheet',notes:g(r,'notes'),url:g(r,'url'),ts:Date.now()});
    added++;
  }
  savePairs();
  if(added){retrainAll();}
  return `Pairings: ${added} added${added?' \u2014 engine retrained':''}.`+(missAll.length?` Couldn\u2019t match: ${missAll.slice(0,5).join('; ')}${missAll.length>5?'\u2026':''}`:'');
}
const IMPORTERS={items:importItemsRows,wear_log:importLogRows,recommended_pairing:importPairRows};

async function syncTab(tab,statusEl){
  const sid=(prefs.sheetId||'').trim();
  if(!sid){statusEl.textContent='Add your sheet ID first.';return;}
  statusEl.textContent='Fetching \u201c'+tab+'\u201d\u2026';
  try{
    const url=`https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;
    const res=await fetch(url);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    if(text.trim().startsWith('<'))throw new Error('not CSV');
    const msg=IMPORTERS[tab](parseDelim(text));
    statusEl.textContent='\u2713 '+msg;renderAll();
  }catch(e){
    statusEl.textContent='Couldn\u2019t fetch \u2014 the sheet must be shared as \u201cAnyone with the link can view\u201d. If it is, your browser may be blocking the request: use copy-paste import below instead.';
  }
}
async function exportJSON(withPhotos){

  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),3000);
}
function importJSON(file){
  const fr=new FileReader();
  fr.onload=async()=>{
    try{
      const d=JSON.parse(fr.result);
      if(!d.items)throw 0;
      items=d.items;wearLog=d.wearLog||[];pairings=d.pairings||[];
      W=Object.assign({},DEFAULT_W,d.weights||{});trainCount=d.trainCount||0;

      renderAll();toast('Backup restored');
    }catch(e){toast('That file doesn\u2019t look like a Wardrobe backup',true);}
  };
  fr.readAsText(file);
}

function currentTab(){const b=$('.tabbtn[aria-selected="true"]');return b?b.dataset.tab:'closet';}
function renderTab(t){['closet','log','pair','stats','data'].forEach(x=>$('#view-'+x).hidden=x!==t);(RENDER[t]||renderCloset)();}
function refreshCounts(){$('#cnt-items').textContent=activeItems().length;$('#cnt-log').textContent=wearLog.length;$('#cnt-pair').textContent=pairings.length;}
function renderAll(){refreshCounts();renderTab(currentTab());updateSelbar();}
function boot(){
  $$('.tabbtn').forEach(b=>b.onclick=()=>{$$('.tabbtn').forEach(x=>x.setAttribute('aria-selected',x===b));renderTab(b.dataset.tab);window.scrollTo({top:0});});
  $('#sb-log').onclick=()=>{if(SEL.size)logModal(null,[...SEL]);};
  $('#sb-pair').onclick=()=>{if(SEL.size>=2)pairModal([...SEL]);};
  $('#sb-suggest').onclick=()=>{if(SEL.size)suggestModal([...SEL]);};
  $('#sb-share').onclick=()=>{if(SEL.size)shareModal([...SEL]);};
  $('#sb-clear').onclick=()=>{SEL.clear();updateSelbar();renderTab(currentTab());};
  renderAll();
  handleHash();
  loadPhotoManifest().then(()=>{if(photoManifest){photoResolved.clear();lazyPhotos(document);}});
  if('serviceWorker'in navigator&&/^https?:$/.test(location.protocol)){
    addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
}
document.addEventListener('DOMContentLoaded',boot);
</script>
</body>
</html>
